[deploy]
startCommand = "npx nx start uvian-intake-web --configuration=production"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"

[deploy.watchPatterns]
paths = [
  "apps/uvian-intake-web/**",
  "packages/ui/**",
  "nx.json",
  "package.json",
  "package-lock.json",
  "tsconfig.base.json"
]

[environments.production]
restartPolicyType = "on_failure"

[environments.staging]
restartPolicyType = "always"
