[deploy]
restartPolicyType = "on_failure"
numReplicas = 1

[deploy.variables]
LOG_LEVEL = "INFO"
ENV = "prod"

[deploy.watchPatterns]
paths = [
  "apps/uvian-automation-worker/**",
  "nx.json"
]

[environments.production]
restartPolicyType = "on_failure"

[environments.staging]
restartPolicyType = "always"
